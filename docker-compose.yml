version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:80"
    volumes:
      - ".:/var/www/html"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: php_js_mysql_lab
      DB_USERNAME: labuser
      DB_PASSWORD: labpassword

  db:
    image: mysql:8.0
    command: --general-log=1 --general-log-file=/var/lib/mysql/general.log
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: php_js_mysql_lab
      MYSQL_USER: labuser
      MYSQL_PASSWORD: labpassword
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/migrations/001_create_tables.sql:/docker-entrypoint-initdb.d/001_create_tables.sql
      - ./database/seeds/seed_data.sql:/docker-entrypoint-initdb.d/002_seed_data.sql

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db

volumes:
  mysql_data:
